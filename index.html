<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" type="text/css" href="styles/style.css">
    <title>Catálogo de Filmes</title>
</head>

<body>
    <header class="titulo-card">
        <h1>Catálogo de Filmes</h1>
    </header>
    <main class = "main-container">
        <h2>Cadastrar Filme</h2>

        <form action="http://localhost:3000/add-filme" method="POST">
            <div class = "formularios">
                <label>Nome:</label><br>
                <input type="text" name="nome" required placeholder="Nome do filme"><br><br>
            </div>

            <div class="formularios">
                <label for="categoria">Categoria:</label><br>
                <select name="categoria" id="categoria" required>
                    <option value="" disabled selected>Selecione uma categoria</option>
                    <option value="Ação">Ação</option>
                    <option value="Drama">Drama</option>
                    <option value="Terror">Terror</option>
                    <option value="Romance">Romance</option>
                    <option value="Suspense">Suspense</option>
                    <option value="Animação">Animação</option>
                    <option value="Comédia">Comédia</option>
                </select> <br><br>
            </div>

            <div class = "formularios">
                <label>Descrição:</label><br>
                <textarea name = "descricao" class = "caixa-descricao" required placeholder = "Digite aqui a descrição"> </textarea> <br><br>
            </div>

            <div class = "formularios">
                <label>Nota do filme:</label><br>
                <input type="number" name="nota" required placeholder="Nota do filme"><br><br>
            </div>

            <button type="submit">Salvar</button>
        </form>
    </main>
</body>
</html>
